version: '3.8'

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data: {}
  grafana-data: {}
#  django_db_data: {}
  postgres_data: {}

services:
  db:
    image: postgres:15-alpine
    container_name: RE_Postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    container_name: RE_App
    command: >
      bash -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ..:/code
      - ./code/db:/code/db
      - ./media:/code/media
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.django.base
    depends_on:
      - redis

  celery:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    container_name: RE_Celery
    command: celery -A config worker -l info
    volumes:
      - ..:/code
      - ./code/db:/code/db
    env_file: 
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.django.base
    depends_on:
      - redis

  celery-beat:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    container_name: RE_Celery_Beat
    command: celery -A config beat -l info
    volumes:
      - ..:/code
      - ./code/db:/code/db
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.django.base
    depends_on:
      - redis

  redis:
    image: redis:6
    container_name: RE_Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: Prometheus
    restart: unless-stopped
    volumes:
      - ../prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - 9090:9090
    networks:
      - monitoring

  grafana:
    image: grafana/grafana-oss:latest
    container_name: Grafana
    ports:
      - '3001:3000'
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - monitoring