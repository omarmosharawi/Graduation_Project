upstream django {
    server django:8000;
}

server {
    listen 80;

    # Change this to your actual server IP or domain name later
    server_name _;

    # 1. Ignore server tokens for security
    server_tokens off;

    # 2. Route all API traffic to Gunicorn/Django
    location / {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # 3. Serve Static Files incredibly fast
    location /static/ {
        alias /code/staticfiles/;
    }

    # 4. Serve Media Files (Profile pictures, Kiosk maps, etc.)
    location /media/ {
        alias /code/media/;
    }
}