name: The RE Platform CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests & Linting
    runs-on: ubuntu-latest
    
    # Set up isolated background services for testing
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: re_platform_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6-alpine
        ports:
          - 6379:6379

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install Dependencies
      working-directory: ./Backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Flake8 Linting
      working-directory: ./Backend
      run: |
        # Stop the build if there are syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Django System Check
      working-directory: ./Backend
      env:
        SECRET_KEY: 'test-key-do-not-use-in-production'
        POSTGRES_DB: re_platform_test
        POSTGRES_USER: testuser
        POSTGRES_PASSWORD: testpassword
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
      run: |
        python manage.py check

  deploy:
    name: Deploy to Hostinger VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Execute Remote SSH Commands
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.HOSTINGER_IP }}
        username: ${{ secrets.HOSTINGER_USER }}
        key: ${{ secrets.HOSTINGER_SSH_KEY }}
        script: |
          cd /path/to/your/project/folder
          
          # Pull latest code
          git pull origin main
          
          # Rebuild and restart Docker containers in the background
          docker-compose -f Backend/Docker/docker-compose.yml down
          docker-compose -f Backend/Docker/docker-compose.yml build --no-cache
          docker-compose -f Backend/Docker/docker-compose.yml up -d
          
          # Clean up old dangling Docker images to save VPS storage
          docker image prune -f