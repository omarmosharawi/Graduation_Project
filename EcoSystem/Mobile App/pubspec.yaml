# ===============================================================================
# PUBSPEC.YAML - REward Flutter App
# ===============================================================================
# This file defines the project metadata, dependencies, and assets for the
# REward recycling vending machine application.
# ===============================================================================

name: reward_app
description: "REward - A smart recycling vending machine app that rewards users for recycling bottles and cans. Communicates with ESP32 hardware via Bluetooth."

# -------------------------------------------------------------------------------
# App Version
# -------------------------------------------------------------------------------
# Version format: major.minor.patch+buildNumber
# - major: Breaking changes
# - minor: New features (backward compatible)
# - patch: Bug fixes
# - buildNumber: Incremental build identifier for Play Store
publish_to: 'none' # This app is not published to pub.dev
version: 1.1.0+2

# -------------------------------------------------------------------------------
# Flutter SDK Constraints
# -------------------------------------------------------------------------------
environment:
  sdk: ^3.6.0

# ===============================================================================
# DEPENDENCIES
# ===============================================================================
# Core packages required for the app to function.
dependencies:
  flutter:
    sdk: flutter

  # -----------------------------------------------------------------------------
  # UI & Material Design
  # -----------------------------------------------------------------------------
  cupertino_icons: ^1.0.8        # iOS-style icons for cross-platform consistency
  google_fonts: ^6.2.1           # Custom typography (Inter, Poppins fonts)
  flutter_svg: ^2.0.10+1         # SVG image support for scalable graphics
  cached_network_image: ^3.4.1   # Efficient image loading with caching
  shimmer: ^3.0.0                # Loading placeholder animations
  lottie: ^3.1.3                 # Lottie animations for engaging UI
  
  # -----------------------------------------------------------------------------
  # Navigation & State Management
  # -----------------------------------------------------------------------------
  go_router: ^14.6.2             # Declarative routing and deep linking
  provider: ^6.1.2               # Lightweight state management solution
  
  # -----------------------------------------------------------------------------
  # Networking & Storage
  # -----------------------------------------------------------------------------
  dio: ^5.7.0                    # Powerful HTTP client with interceptors
  shared_preferences: ^2.3.4     # Simple key-value persistent storage
  flutter_secure_storage: ^9.2.2 # Secure storage for sensitive data (tokens)
  
  # -----------------------------------------------------------------------------
  # Firebase
  # -----------------------------------------------------------------------------
  firebase_core: ^3.8.1          # Firebase initialization
  firebase_auth: ^5.3.4          # Firebase Authentication
  firebase_storage: ^12.3.2       # Firebase Storage for profile pictures
  cloud_firestore: ^5.6.0        # Firestore database
  google_sign_in: ^6.2.2         # Google Sign-In authentication
  firebase_messaging: ^15.1.6    # Push notifications
  flutter_local_notifications: ^18.0.1  # Local notifications for foreground
  image_picker: ^1.1.2           # Picking profile pictures from gallery/camera
  
  # -----------------------------------------------------------------------------
  # Bluetooth for ESP32 Communication
  # -----------------------------------------------------------------------------
  flutter_blue_plus: ^1.35.2     # BLE (Bluetooth Low Energy) communication
  
  # -----------------------------------------------------------------------------
  # QR Code Generation
  # -----------------------------------------------------------------------------
  qr_flutter: ^4.1.0             # Generate QR codes for user identification
  
  # -----------------------------------------------------------------------------
  # Location & Maps
  # -----------------------------------------------------------------------------
  google_maps_flutter: ^2.10.0   # Interactive maps for kiosk locations
  geolocator: ^13.0.2            # Get user's current GPS location
  geocoding: ^3.0.0              # Convert coordinates to addresses
  
  # -----------------------------------------------------------------------------
  # Form & Input Handling
  # -----------------------------------------------------------------------------
  pin_code_fields: ^8.0.1        # OTP input fields
  carousel_slider: ^5.1.1        # Carousel for onboarding and offers
  
  # -----------------------------------------------------------------------------
  # Utilities
  # -----------------------------------------------------------------------------
  intl: ^0.19.0                  # Internationalization and date formatting
  uuid: ^4.5.1                   # Generate unique identifiers
  logger: ^2.5.0                 # Structured logging for debugging
  permission_handler: ^11.3.1    # Handle runtime permissions (Bluetooth, Location)
  url_launcher: ^6.3.0           # Open external URLs (web, email, phone)
  flutter_launcher_icons: ^0.14.4
  audioplayers: ^6.5.1
  fl_chart: ^0.70.2

# ===============================================================================
# DEV DEPENDENCIES
# ===============================================================================
# Packages used only during development (testing, linting, code generation).
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0          # Recommended lint rules for Flutter
  mockito: ^5.4.4                # Mocking framework for unit tests
  build_runner: ^2.4.13          # Code generation runner

# ===============================================================================
# FLUTTER LAUNCHER ICONS CONFIGURATION
# ===============================================================================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/RE greensvg.png"
  min_sdk_android: 23
  adaptive_icon_background: "#1E3A34"
  adaptive_icon_foreground: "assets/logo/RE greensvg.png"

# ===============================================================================
# FLUTTER CONFIGURATION
# ===============================================================================
flutter:
  uses-material-design: true
  
  # -----------------------------------------------------------------------------
  # Asset Directories
  # -----------------------------------------------------------------------------
  # All images, icons, and other static assets are loaded from these directories.
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/logo/
    - assets/audio/

  # -----------------------------------------------------------------------------
  # Custom Fonts (Optional)
  # -----------------------------------------------------------------------------
  # Using google_fonts package instead for dynamic font loading.
  # Uncomment below to bundle fonts locally for offline support.
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
